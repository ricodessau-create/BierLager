name: Build BierLager

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    - name: Upload Artifact (Die fertige JAR)
      uses: actions/upload-artifact@v4
      with:
        name: BierLager-Plugin
        path: target/BierLager-3.2.1.jar
