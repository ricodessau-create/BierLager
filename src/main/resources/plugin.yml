name: BierLager
version: 3.2.1
main: de.bierrang.plugin.BierLager
api-version: '1.21'
depend: [PlotSquared]
commands:
  bierlager:
    description: Hauptbefehl für das Lagersystem
    usage: /bierlager
    aliases: [lager]
permissions:
  bierlager.use:
    description: Erlaubt das Holen des Werkzeugs
    default: true  
  bierlager.admin:
    description: Admin Rechte (falls nötig für Reload etc.)
    default: op
