name: Build BierLager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 21 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build mit Maven
        run: mvn -B clean package --file pom.xml

      - name: JAR hochladen
        uses: actions/upload-artifact@v4
        with:
          name: BierLager-${{ github.sha }}
          path: target/BierLager-*.jar
          retention-days: 30

      - name: Release-Asset hochladen
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: target/BierLager-*.jar
